l_english:
 agi_ck3_eval_probe_decision: "AGI-CK3 Eval Probe"
 agi_ck3_eval_probe_decision_desc: "Mark this character as visible to the AGI-CK3 evaluation harness."
 agi_ck3_eval_probe_decision_tooltip: "Adds a harmless character variable that the external harness can look for in saves."
 agi_ck3_eval_probe_decision_confirm: "Mark Probe"
 agi_ck3_eval_probe_effect_tooltip: "This writes harmless probe variables onto your character for save/log verification."
 agi_ck3_eval_status_decision: "AGI-CK3 Eval Status"
 agi_ck3_eval_status_decision_desc: "Show the current eval marker status for this character."
 agi_ck3_eval_status_decision_tooltip: "Opens a harmless status event after the probe has been marked."
 agi_ck3_eval_status_decision_confirm: "Show Status"
 agi_ck3_eval_refresh_telemetry_decision: "AGI-CK3 Refresh Telemetry"
 agi_ck3_eval_refresh_telemetry_decision_desc: "Refresh harmless benchmark telemetry variables for the current save."
 agi_ck3_eval_refresh_telemetry_decision_tooltip: "Updates character variables for faith group, culture presence, title tier, realm size, HRE state, and yearly progress."
 agi_ck3_eval_refresh_telemetry_decision_confirm: "Refresh Telemetry"
 agi_ck3_eval.0001.t: "AGI-CK3 Probe Marked"
 agi_ck3_eval.0001.desc: "This character now carries AGI-CK3 probe variables. Save the game and run the harness probe verifier against the save."
 agi_ck3_eval.0001.a: "Continue"
 agi_ck3_eval.0002.t: "AGI-CK3 Eval Status"
 agi_ck3_eval.0002.desc: "The eval harness probe is present. The external runner can verify it from a save artifact."
 agi_ck3_eval.0002.a: "Continue"
 agi_ck3_eval.0003.t: "AGI-CK3 Telemetry Refreshed"
 agi_ck3_eval.0003.desc: "Benchmark telemetry variables have been refreshed for this character. Save the game before running the harness extractor."
 agi_ck3_eval.0003.a: "Continue"
 agi_ck3_eval_lab_noop_decision: "AGI-CK3 Lab: No-Op Event Option"
 agi_ck3_eval_lab_noop_decision_desc: "Open a controlled one-option event whose option has no body effect."
 agi_ck3_eval_lab_multi_decision: "AGI-CK3 Lab: Multi Option"
 agi_ck3_eval_lab_multi_decision_desc: "Open a controlled event with three static options and distinct harmless markers."
 agi_ck3_eval_lab_after_decision: "AGI-CK3 Lab: After Block"
 agi_ck3_eval_lab_after_decision_desc: "Open a controlled event whose event-level after block writes a harmless marker."
 agi_ck3_eval_lab_chain_decision: "AGI-CK3 Lab: Chained Event"
 agi_ck3_eval_lab_chain_decision_desc: "Open a controlled event whose selected option opens a second controlled event."
 agi_ck3_eval_lab_window_character_decision: "AGI-CK3 Lab: Character Window"
 agi_ck3_eval_lab_window_character_decision_desc: "Open a controlled option event in the default character event window."
 agi_ck3_eval_lab_window_big_decision: "AGI-CK3 Lab: Big Window"
 agi_ck3_eval_lab_window_big_decision_desc: "Open a controlled option event in the big event window."
 agi_ck3_eval_lab_window_duel_decision: "AGI-CK3 Lab: Duel Window"
 agi_ck3_eval_lab_window_duel_decision_desc: "Open a controlled option event in the duel event window."
 agi_ck3_eval_lab_window_fullscreen_decision: "AGI-CK3 Lab: Fullscreen Window"
 agi_ck3_eval_lab_window_fullscreen_decision_desc: "Open a controlled option event in the fullscreen event window."
 agi_ck3_eval_lab_decision_tooltip: "Opens a harmless controlled event-option test case."
 agi_ck3_eval_lab_decision_confirm: "Open Lab Event"
 agi_ck3_eval.0100.t: "AGI-CK3 Event Option Lab: No-Op"
 agi_ck3_eval.0100.desc: "This controlled event has one static visible option and no option-body effect."
 agi_ck3_eval.0100.a: "No-op option"
 agi_ck3_eval.0101.t: "AGI-CK3 Event Option Lab: Multiple Options"
 agi_ck3_eval.0101.desc: "This controlled event has three static visible options. Each option writes a different harmless marker."
 agi_ck3_eval.0101.a: "Mark option A"
 agi_ck3_eval.0101.b: "Mark option B"
 agi_ck3_eval.0101.c: "Mark option C"
 agi_ck3_eval.0102.t: "AGI-CK3 Event Option Lab: After Block"
 agi_ck3_eval.0102.desc: "This controlled event writes a harmless marker from its event-level after block."
 agi_ck3_eval.0102.a: "Close through after block"
 agi_ck3_eval.0103.t: "AGI-CK3 Event Option Lab: Chain Source"
 agi_ck3_eval.0103.desc: "This controlled event writes a harmless marker and opens the chain target event."
 agi_ck3_eval.0103.a: "Open chain target"
 agi_ck3_eval.0104.t: "AGI-CK3 Event Option Lab: Chain Target"
 agi_ck3_eval.0104.desc: "This controlled event marks that the chain target appeared."
 agi_ck3_eval.0104.a: "Complete chain"
 agi_ck3_eval.0110.t: "AGI-CK3 Event Option Lab: Character Window"
 agi_ck3_eval.0110.desc: "This controlled event uses the default character event window."
 agi_ck3_eval.0110.a: "Mark character window"
 agi_ck3_eval.0111.t: "AGI-CK3 Event Option Lab: Big Window"
 agi_ck3_eval.0111.desc: "This controlled event uses the big event window."
 agi_ck3_eval.0111.a: "Mark big window"
 agi_ck3_eval.0112.t: "AGI-CK3 Event Option Lab: Duel Window"
 agi_ck3_eval.0112.desc: "This controlled event uses the duel event window."
 agi_ck3_eval.0112.a: "Mark duel window"
 agi_ck3_eval.0113.t: "AGI-CK3 Event Option Lab: Fullscreen Window"
 agi_ck3_eval.0113.desc: "This controlled event uses the fullscreen event window."
 agi_ck3_eval.0113.a: "Mark fullscreen window"
